<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'drivers')}">

<body>

  <h2><i class="bi bi-clipboard-check me-2"></i><span th:text="#{getQuote}">Get a Quote</span></h2>

  <div th:if="${noVehiclesMessage}" class="alert alert-warning d-flex align-items-center">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${noVehiclesMessage}"></span>
  </div>

  <div class="card shadow-sm" th:if="${not driver.vehicles.isEmpty()}">
    <div class="card-body p-4">
      <form method="post">

        <div class="form-floating mb-3">
          <select name="vehicleId" id="vehicleId" class="form-select">
            <option th:each="vehicle : ${driver.vehicles}" th:value="${vehicle.id}" th:text="${vehicle.displayName}">
              vehicle
            </option>
          </select>
          <label for="vehicleId" th:text="#{vehicle}">Vehicle</label>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <select name="liabilityLimit" id="liabilityLimit" class="form-select">
                <option th:each="limit : ${liabilityLimits}" th:value="${limit}" th:text="${limit.displayName}">limit</option>
              </select>
              <label for="liabilityLimit" th:text="#{liabilityLimit}">Liability Limit</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <select name="deductible" id="deductible" class="form-select">
                <option th:each="ded : ${deductibles}" th:value="${ded}" th:text="${ded.displayName}">deductible</option>
              </select>
              <label for="deductible" th:text="#{deductible}">Deductible</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-2">
          <i class="bi bi-magic me-1"></i><span th:text="#{generateQuote}">Generate Quote</span>
        </button>

      </form>
    </div>
  </div>

  <a th:if="${driver.vehicles.isEmpty()}" th:href="@{/drivers/__${driver.id}__/vehicles/new}" class="btn btn-primary">
    <i class="bi bi-plus-circle me-1"></i><span th:text="#{addNewVehicle}">Add New Vehicle</span>
  </a>

</body>

</html>
