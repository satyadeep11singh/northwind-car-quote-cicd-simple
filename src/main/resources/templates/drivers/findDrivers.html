<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'drivers')}">

<body>

  <h2><i class="bi bi-search me-2"></i><span th:text="#{findDrivers}">Find Drivers</span></h2>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form th:object="${driver}" th:action="@{/drivers}" method="get" id="search-driver-form">
        <div class="form-floating mb-3" style="max-width: 24rem;">
          <input class="form-control" th:field="*{lastName}" id="lastName" placeholder="Last name" maxlength="80" />
          <label for="lastName" th:text="#{lastName}">Last name</label>
        </div>
        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-warning py-2">
          <p class="mb-0" th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-search me-1"></i><span th:text="#{findDriver}">Find Driver</span>
          </button>
          <a class="btn btn-outline-primary" th:href="@{/drivers/new}">
            <i class="bi bi-person-plus me-1"></i><span th:text="#{addDriver}">Add Driver</span>
          </a>
        </div>
      </form>
    </div>
  </div>

</body>

</html>
