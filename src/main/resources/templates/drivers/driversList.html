<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'drivers')}">

<body>

  <h2><i class="bi bi-people me-2"></i><span th:text="#{drivers}">Drivers</span></h2>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table id="drivers" class="table table-striped table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th th:text="#{name}">Name</th>
            <th th:text="#{address}">Address</th>
            <th th:text="#{city}">City</th>
            <th th:text="#{telephone}">Telephone</th>
            <th th:text="#{vehicles}">Vehicles</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="driver : ${listDrivers}">
            <td>
              <a th:href="@{/drivers/__${driver.id}__}" class="fw-semibold text-decoration-none"
                th:text="${driver.firstName + ' ' + driver.lastName}"></a>
            </td>
            <td th:text="${driver.address}"></td>
            <td th:text="${driver.city}"></td>
            <td th:text="${driver.telephone}"></td>
            <td><span class="text-muted" th:text="${#strings.listJoin(driver.vehicles, ', ')}"></span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <nav th:if="${totalPages > 1}" class="mt-3" aria-label="Driver list pages">
    <ul class="pagination">
      <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
        <a class="page-link" th:href="@{'/drivers?page=1'}" th:tabindex="${currentPage <= 1} ? -1 : 0"
          th:title="#{first}"><i class="bi bi-chevron-double-left"></i></a>
      </li>
      <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
        <a class="page-link" th:href="@{'/drivers?page=' + ${currentPage <= 1 ? 1 : currentPage - 1}}"
          th:tabindex="${currentPage <= 1} ? -1 : 0" th:title="#{previous}"><i class="bi bi-chevron-left"></i></a>
      </li>
      <li class="page-item" th:each="i: ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
        <a class="page-link" th:href="@{'/drivers?page=' + ${i}}">[[${i}]]</a>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{'/drivers?page=' + ${currentPage >= totalPages ? totalPages : currentPage + 1}}"
          th:tabindex="${currentPage >= totalPages} ? -1 : 0" th:title="#{next}"><i class="bi bi-chevron-right"></i></a>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{'/drivers?page=__${totalPages}__'}" th:tabindex="${currentPage >= totalPages} ? -1 : 0"
          th:title="#{last}"><i class="bi bi-chevron-double-right"></i></a>
      </li>
    </ul>
  </nav>
</body>

</html>
