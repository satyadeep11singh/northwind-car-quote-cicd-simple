# Database init
database=h2
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
spring.thymeleaf.mode=HTML

# Internationalization
# Explicit basename + disabled system-locale fallback: avoids relying on
# implicit base-file fallback behavior, which has known inconsistencies
# across Spring Boot / JDK combinations (see spring-boot#30801). We ship
# messages_en.properties alongside the base file so en/en_CA/en_US all
# resolve predictably without ever needing system-locale fallback.
spring.messages.basename=messages/messages
spring.messages.fallback-to-system-locale=false
spring.messages.encoding=UTF-8

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Actuator
# Only expose what's needed for container health probes and metrics scraping.
# Unlike the wide-open '*' some demo apps use, this is the set we actually
# need for AKS liveness/readiness probes (health) and Prometheus (prometheus).
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Logging
logging.level.org.springframework=INFO

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h
